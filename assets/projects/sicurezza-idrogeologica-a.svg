<svg viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <circle cx="250" cy="110" r="86" fill="#FFDCC2" opacity=".45"/>
  <g stroke="#1A1A1A" stroke-width="1.5" opacity=".35">
    <path d="M62 40 h12 M68 34 v12"/>
    <path d="M448 60 h12 M454 54 v12"/>
  </g>
  <!-- rain dashes -->
  <g stroke="#0E8C5A" stroke-width="2.5" stroke-linecap="round">
    <path d="M120 34 l-6 16"/>
    <path d="M160 26 l-6 16"/>
    <path d="M200 38 l-6 16"/>
    <path d="M244 24 l-6 16"/>
  </g>
  <!-- hillside slope -->
  <path d="M40 200 L 300 74 L 480 74 L 480 200 Z" fill="#1A1A1A"/>
  <!-- slip surface: dotted arc where the slope gives way -->
  <path d="M150 148 Q 210 160 236 200" fill="none" stroke="#FF7A29" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="0.1 10"/>
  <!-- sliding block detached from the slope -->
  <path d="M150 148 L 210 118 L 236 200 L 176 200 Z" fill="#FF7A29"/>
  <!-- houses on the crest -->
  <g fill="#FFFFFF">
    <path d="M330 74 v-16 h20 v16 Z M328 58 l12 -10 12 10 Z"/>
    <path d="M396 74 v-16 h20 v16 Z M394 58 l12 -10 12 10 Z"/>
  </g>
  <!-- sensor node + detection ring at the slip head -->
  <circle cx="150" cy="148" r="6" fill="#1A1A1A" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="150" cy="148" r="24" fill="none" stroke="#0E8C5A" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="0.1 10"/>
  <!-- valley baseline node -->
  <circle cx="72" cy="200" r="5" fill="#1A1A1A" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="316" y="126" font-family="SF Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="11" fill="#8a8d99">IT · 94% COMUNI A RISCHIO</text>
</svg>
