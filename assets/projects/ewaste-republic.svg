<svg viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <circle cx="260" cy="110" r="86" fill="#FFDCC2" opacity=".45"/>
  <g stroke="#1A1A1A" stroke-width="1.5" opacity=".35">
    <path d="M54 44 h12 M60 38 v12"/>
    <path d="M452 170 h12 M458 164 v12"/>
  </g>
  <!-- dotted arc: West → Accra -->
  <path d="M68 80 Q 160 20 310 110" fill="none" stroke="#0E8C5A" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="0.1 10"/>
  <!-- origin node -->
  <circle cx="68" cy="80" r="7" fill="#1A1A1A" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- CRT monitor body -->
  <rect x="170" y="52" width="180" height="130" rx="8" fill="#1A1A1A"/>
  <!-- screen (orange = toxic glow) -->
  <rect x="186" y="66" width="148" height="96" rx="4" fill="#FF7A29"/>
  <!-- screen X (broken/dead) -->
  <g stroke="#1A1A1A" stroke-width="6" stroke-linecap="round">
    <path d="M204 82 L 316 144"/>
    <path d="M316 82 L 204 144"/>
  </g>
  <!-- monitor neck + base -->
  <rect x="242" y="182" width="36" height="14" fill="#1A1A1A"/>
  <rect x="210" y="196" width="100" height="10" rx="3" fill="#1A1A1A"/>
  <!-- destination node -->
  <circle cx="310" cy="110" r="7" fill="#FF7A29" stroke="#FFFFFF" stroke-width="2.5"/>
  <g font-family="SF Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="11" fill="#8a8d99">
    <text x="42" y="68">EU/US</text>
    <text x="322" y="128">ACC</text>
    <text x="56" y="200">GHA · AGBOGBLOSHIE</text>
  </g>
</svg>
